<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{app.title}">Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="card shadow-lg p-4">

        <div class="text-center mb-4">
            <h1 class="fw-bold text-primary" th:text="#{app.title}">Demo</h1>
            <p class="text-muted" th:text="#{app.subtitle}">Subtitle</p>
        </div>

        <div class="text-center mb-4">
            <a class="btn btn-outline-primary me-2" th:href="@{/(lang='es')}">ES</a>
            <a class="btn btn-outline-secondary me-2" th:href="@{/(lang='en')}">EN</a>
            <a class="btn btn-outline-success" th:href="@{/(lang='pt')}">PT</a>
        </div>

        <div class="alert alert-info text-center">
            <strong th:text="#{label.currentLanguage}">Idioma actual:</strong>
            <span th:text="${#locale.language}">es</span>
        </div>

        <div class="text-center mt-4">
            <a th:href="@{/user(lang=${#locale.language})}"
               class="btn btn-primary me-2"
               th:text="#{btn.login}">
                Login
            </a>

            <a th:href="@{/user(lang=${#locale.language})}"
               class="btn btn-outline-secondary me-2">
                USER
            </a>

            <a th:href="@{/admin(lang=${#locale.language})}"
               class="btn btn-outline-danger">
                ADMIN
            </a>
        </div>

    </div>
</div>
</body>
</html>
