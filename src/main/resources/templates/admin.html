<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="card p-4 shadow">
    <h1 class="text-danger" th:text="#{page.admin.title}">Admin Page</h1>
    <p th:text="#{page.admin.desc}">Only ADMIN can see this.</p>

    <div class="mt-3">
      <a class="btn btn-secondary" th:href="@{/(lang=${#locale.language})}" th:text="#{btn.back}">Back</a>
      <a class="btn btn-danger" href="/logout" th:text="#{btn.logout}">Logout</a>
    </div>
  </div>
</div>
</body>
</html>
